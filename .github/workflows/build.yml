name: Build and Sign AUR Repo
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  packages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: list
        run: |
          echo "matrix=$(grep -v '^#' packages.txt | grep -v '^$' | jq -R -s -c 'split("\n") | map(select(. != "")) | map({group: ., name: split(" ")[0]})')" >> "$GITHUB_OUTPUT"

  build:
    needs: packages
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.packages.outputs.matrix) }}
    steps:
      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm git gnupg ccache github-cli

      - uses: actions/checkout@v6

      - name: Create build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - name: Check if build is needed
        id: check
        run: |
          all_assets=$(gh release view repository --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>&1) || true
          needed=false

          for pkg in ${{ matrix.group }}; do
            su builder -c "git clone --depth 1 https://aur.archlinux.org/${pkg}.git /tmp/${pkg}"
            aur_ver=$(su builder -c "cd /tmp/${pkg} && source PKGBUILD && echo \${epoch:+\${epoch}:}\${pkgver}-\${pkgrel}")

            if echo "$all_assets" | grep -qF "${pkg}-${aur_ver}-"; then
              echo "Skipping ${pkg}: version ${aur_ver} already built"
            else
              echo "Will build ${pkg} version ${aur_ver}"
              needed=true
            fi
          done

          echo "needed=${needed}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure makepkg
        if: steps.check.outputs.needed == 'true'
        run: |
          # Use all available cores
          sed -i "s/#MAKEFLAGS=.*/MAKEFLAGS=\"-j$(nproc)\"/" /etc/makepkg.conf
          # Enable ccache
          sed -i 's/!ccache/ccache/' /etc/makepkg.conf
          # Optimize for Alder Lake (i7-12700)
          sed -i 's/-march=x86-64/-march=alderlake/' /etc/makepkg.conf
          sed -i 's/-mtune=generic/-mtune=alderlake/' /etc/makepkg.conf
          # Set packager
          sed -i 's/#PACKAGER=.*/PACKAGER="Theodoros Orfanidis <teoulas@duck.com>"/' /etc/makepkg.conf
          # Disable debug packages
          sed -i 's/OPTIONS=(\(.*\)debug/OPTIONS=(\1!debug/' /etc/makepkg.conf

      - name: Import GPG key
        if: steps.check.outputs.needed == 'true'
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Restore ccache
        if: steps.check.outputs.needed == 'true'
        uses: actions/cache@v5
        with:
          path: /home/builder/.cache/ccache
          key: ccache-${{ matrix.name }}-${{ github.run_id }}
          restore-keys: ccache-${{ matrix.name }}-

      - name: Fix ccache permissions
        if: steps.check.outputs.needed == 'true'
        run: |
          mkdir -p /home/builder/.cache/ccache
          chown -R builder:builder /home/builder/.cache/ccache

      - name: Build packages
        if: steps.check.outputs.needed == 'true'
        run: |
          mkdir -p /tmp/built-packages
          for pkg in ${{ matrix.group }}; do
            # Apply PKGBUILD overrides if they exist
            if [ -f "overrides/${pkg}/PKGBUILD.append" ]; then
              cat "overrides/${pkg}/PKGBUILD.append" >> "/tmp/${pkg}/PKGBUILD"
              echo "Applied PKGBUILD.append override for ${pkg}"
            fi
            su builder -c "cd /tmp/${pkg} && makepkg -s --noconfirm"
            # Install the built package so subsequent packages can depend on it
            pacman -U --noconfirm /tmp/${pkg}/*.pkg.tar.zst
            cp /tmp/${pkg}/*.pkg.tar.zst /tmp/built-packages/
          done

      - name: Sign packages
        if: steps.check.outputs.needed == 'true'
        run: |
          for f in /tmp/built-packages/*.pkg.tar.zst; do
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase '${{ secrets.GPG_PASSPHRASE }}' \
              --detach-sign "$f"
          done

      - name: Upload artifact
        if: steps.check.outputs.needed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: pkg-${{ matrix.name }}
          path: |
            /tmp/built-packages/*.pkg.tar.zst
            /tmp/built-packages/*.pkg.tar.zst.sig

      - name: Print ccache stats
        if: always() && steps.check.outputs.needed == 'true'
        run: |
          su builder -c "ccache -s"

  release:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    permissions:
      contents: write
    steps:
      - name: Install tools
        run: |
          pacman -Syu --noconfirm gnupg github-cli jq

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye 2>/dev/null || true
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "passphrase-file /tmp/.gpg_passphrase" >> ~/.gnupg/gpg.conf
          echo -n "$GPG_PASSPHRASE" > /tmp/.gpg_passphrase
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Download all package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: pkg-*
          merge-multiple: true
          path: packages/

      - name: Create repo database
        run: |
          # Check if any packages were built
          if [ ! -d packages ] || ! ls packages/*.pkg.tar.zst 1>/dev/null 2>&1; then
            echo "No packages to release"
            exit 0
          fi
          cd packages/
          repo-add --sign --key "$(gpg --list-secret-keys --keyid-format long | grep sec | awk '{print $2}' | cut -d/ -f2)" \
            teoulas.db.tar.gz *.pkg.tar.zst
          cp --remove-destination teoulas.db.tar.gz teoulas.db
          cp --remove-destination teoulas.db.tar.gz.sig teoulas.db.sig
          cp --remove-destination teoulas.files.tar.gz teoulas.files
          cp --remove-destination teoulas.files.tar.gz.sig teoulas.files.sig

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: repository
          files: |
            packages/*.pkg.tar.zst
            packages/*.pkg.tar.zst.sig
            packages/teoulas.db*
            packages/teoulas.files*

      - name: Clean up old package versions
        run: |
          # For each package, keep only the latest version and remove older ones
          gh release view repository --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | \
            grep '\.pkg\.tar\.zst$' | sort | while read -r asset; do
              pkg_base=$(echo "$asset" | sed 's/-[^-]*-[^-]*-[^-]*\.pkg\.tar\.zst$//')
              echo "${pkg_base} ${asset}"
            done | sort -t' ' -k1,1 -k2,2r | awk '{
              if ($1 != prev) { count=0; prev=$1 }
              count++
              if (count > 1) print $2
            }' | while read -r old; do
              echo "Removing old asset: ${old}"
              gh release delete-asset repository "$old" --repo "$GITHUB_REPOSITORY" --yes
              # Also remove its signature if it exists
              gh release delete-asset repository "${old}.sig" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
            done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
