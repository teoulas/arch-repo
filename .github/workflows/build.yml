name: Build and Sign AUR Repo
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to upload to Releases
    steps:
      - uses: actions/checkout@v4

      - name: Build AUR Packages
        uses: repolib/action-aur@v1
        with:
          # This action understands AUR names directly
          aur_packages: |
            llama.cpp-vulkan
            llama.cpp-hip
          repo_name: teoulas
          # Signing configuration
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_passphrase: ${{ secrets.GPG_PASSPHRASE }}
        # The GITHUB_TOKEN is needed to fetch from AUR and prepare files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: repository
          # Note: this action puts files in the workspace root
          files: |
            *.pkg.tar.zst
            *.pkg.tar.zst.sig
            teoulas.db*
            teoulas.files*
